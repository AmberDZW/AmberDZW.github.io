<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>离线可用 | ZHIYU</title>
    <link rel="stylesheet" href="./styles.css" />
    <meta name="theme-color" content="#183f35" />
  </head>
  <body>
    <main style="min-height: 100vh; padding: 48px 16px; display: grid; align-content: center; background: var(--paper);">
      <section style="max-width: 760px; margin: 0 auto; border-radius: 12px; padding: 24px; background: #fffdf7; border: 1px solid var(--line); box-shadow: var(--shadow);">
        <h1 style="margin-top: 0; color: var(--green);">当前离线，已进入缓存模式</h1>
        <p style="color: var(--muted); line-height: 1.8; margin-bottom: 16px;">
        已缓存的首页、提示词卡片、安全包、新手 7 天和工具池仍可打开。恢复网络后，页面会继续更新最新版本。
        </p>

        <div id="offline-last-route" style="margin-bottom: 16px; display: none;">
          <h2 style="margin: 0 0 10px; color: var(--green); font-size: 18px;">上次入口</h2>
          <a id="offline-last-route-link" href="./index.html" style="display: inline-flex; min-height: 36px; align-items: center; padding: 0 12px; border-radius: 8px; border: 1px solid rgba(24, 63, 53, 0.3); background: #fffef7; color: var(--green); text-decoration: none; font-weight: 800;">
            返回上次入口
          </a>
        </div>

        <div>
          <h2 style="margin: 0 0 10px; color: var(--green); font-size: 18px;">常用入口</h2>
          <ul id="offline-shortcuts" style="padding-left: 18px; line-height: 1.9; color: var(--muted); margin-top: 0;"></ul>
        </div>

        <p style="margin-top: 18px;">
          <a href="./index.html" style="color: var(--green); font-weight: 800; text-decoration: none;">返回首页</a>
        </p>
      </section>
    </main>
    <script>
      (function () {
        const LAST_ROUTE_KEY = "zy.lastRoute.v1";
        const QUICK_USAGE_KEY = "zy.quickShortcutsUsage.v1";
        const ALLOW_HASH_TARGETS = new Set(["top", "resources", "tools", "faq", "roadmap", "safety"]);
        const INDEX_URL = new URL("./index.html", window.location.href);

        const routeContainer = document.querySelector("#offline-last-route");
        const routeLink = document.querySelector("#offline-last-route-link");
        const shortcuts = document.querySelector("#offline-shortcuts");

        if (!shortcuts || !routeContainer || !routeLink) return;

        function toIndexHashUrl(hashText) {
          const indexUrl = new URL(INDEX_URL.href);
          indexUrl.hash = hashText || "#top";
          return indexUrl.href;
        }

        function isOnsiteHashRoute(hashText) {
          return (
            typeof hashText === "string" &&
            hashText.startsWith("#") &&
            /#(top|resources|tools|faq|roadmap|safety)(\?|$)/.test(hashText)
          );
        }

        function createSafeLink(hashText, text) {
          const li = document.createElement("li");
          const link = document.createElement("a");
          link.href = toIndexHashUrl(hashText);
          link.textContent = text || "返回首页";
          link.style.color = "var(--green)";
          link.style.fontWeight = "800";
          link.style.textDecoration = "none";
          li.appendChild(link);
          return li;
        }

        function buildRouteHash(raw) {
          if (!raw || typeof raw !== "object") return "#top";
          const target = typeof raw.target === "string" && raw.target ? raw.target.replace(/^#/, "") : "top";
          if (!ALLOW_HASH_TARGETS.has(target)) return "#top";

          const query = [];
          if (raw.params && typeof raw.params === "object") {
            Object.entries(raw.params).forEach(([key, value]) => {
              if (typeof value === "string" && value.trim()) {
                query.push(`${encodeURIComponent(key)}=${encodeURIComponent(value)}`);
              }
            });
          }
          return `#${target}${query.length > 0 ? `?${query.join("&")}` : ""}`;
        }

        function safeHashFromStoredLink(rawLink) {
          if (typeof rawLink !== "string") return "#top";
          const trimmed = rawLink.trim();
          if (!trimmed) return "#top";

          if (trimmed.startsWith("#")) {
            return isOnsiteHashRoute(trimmed) ? trimmed : "#top";
          }

          try {
            const parsed = new URL(trimmed, window.location.href);
            if (parsed.origin !== INDEX_URL.origin) return "#top";
            if (parsed.pathname.endsWith("/website/index.html") || parsed.pathname.endsWith("/index.html")) {
              return parsed.hash && isOnsiteHashRoute(parsed.hash) ? parsed.hash : "#top";
            }
          } catch (error) {
            return "#top";
          }
          return "#top";
        }

        try {
          const rawRoute = JSON.parse(window.localStorage.getItem(LAST_ROUTE_KEY) || "null");
          if (rawRoute && typeof rawRoute === "object") {
            const hash = buildRouteHash(rawRoute);
            routeContainer.style.display = "block";
            routeLink.href = toIndexHashUrl(hash);
          }
        } catch (error) {
          // Ignore malformed local storage.
        }

        let usage = {};
        try {
          const raw = window.localStorage.getItem(QUICK_USAGE_KEY);
          usage = raw ? JSON.parse(raw) : {};
        } catch (error) {
          usage = {};
        }

        const items = Object.values(usage || {})
          .filter((item) => item && typeof item.componentName === "string")
          .map((item) => ({
            name: item.componentName,
            href:
              item.componentRoute && typeof item.componentRoute === "string"
                ? item.componentRoute
                : item.componentHref || "#top",
            score: Number(item.count || 0),
            at: Number(item.lastUsedAt || 0)
          }))
          .sort((a, b) => {
            if (a.score !== b.score) return b.score - a.score;
            if (a.at !== b.at) return b.at - a.at;
            return 0;
          })
          .slice(0, 2);

        if (items.length === 0) {
          shortcuts.appendChild(createSafeLink("#top", "暂无常用入口，返回首页重新选择"));
      shortcuts.appendChild(createSafeLink("#resources?filter=prompt&focus=prompt", "打开提示词卡片"));
          return;
        }

        items.forEach((item) => {
          shortcuts.appendChild(createSafeLink(safeHashFromStoredLink(item.href), item.name));
        });
      })();
    </script>
  </body>
</html>
